name: windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
  
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
          include:
            - build: windows
              os: windows-latest
              target: x86_64-pc-windows-msvc
  
    steps:
      - uses: actions/checkout@v4    
      - name: Get the release version from the tag
        shell: bash
        # run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV # TODO
        run: echo "VERSION=1.0.0" >> $GITHUB_ENV
       
      - name: Fix microslop # https://github.com/microsoft/python-environment-tools/issues/171
        shell: bash
        run: git config --global core.longpaths true
        
      - name: Build
        run: cargo build --verbose --release --package gram --package cli --target ${{ matrix.target }}
        
      - name: Build archive
        shell: bash
        run: |
        
            binary_name="gram"
            dirname="$binary_name-${{ env.VERSION }}-${{ matrix.target }}"
            mkdir "$dirname"
            mv "target/${{ matrix.target }}/release/$binary_name.exe" "$dirname"
            mv "target/${{ matrix.target }}/release/cli.exe" "$dirname"        

            7z a "$dirname.zip" "$dirname"
            echo "ASSET=$dirname.zip" >> $GITHUB_ENV
  
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.ASSET }}
