name: Build and test
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-amd64:
    runs-on: rust-amd64
    steps:
      - uses: actions/checkout@v4
      - name: Cache build
        uses: actions/cache@v3
        id: cache-gram-build
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-gram-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: install nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ~/.cargo/bin
      - name: install linux dependencies
        run: ./script/linux
      - name: install mold
        run: ./script/install-mold
      - name: download wasi-sdk
        run: ./script/download-wasi-sdk
      - run: cargo nextest run --workspace --success-output never --show-progress none
