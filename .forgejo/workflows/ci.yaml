name: Build and test
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-amd64:
    runs-on: ubuntu-latest-amd64
    steps:
      - uses: actions/checkout@v4
      - name: Cache build
        uses: actions/cache@v3
        id: cache-gram-build
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-gram-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Set up Rust
        uses: https://code.forgejo.org/msrd0/rust-toolchain@1.93
        with:
          components: clippy, rustfmt
      - name: install linux dependencies
        run: ./script/linux
      - name: install mold
        run: ./script/install-mold
      - name: download wasi-sdk
        run: ./script/download-wasi-sdk
      - run: cargo test --workspace
